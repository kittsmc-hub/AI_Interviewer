<!DOCTYPE html>
<html lang="en">
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AI Interview Generator</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/animations.css">

  <!-- Prevent favicon 404 -->
  <link rel="icon" href="data:,">
</head>

<body>

  <main class="app">

    <p class="eyebrow">
      AI Interview Prep
    </p>

    <h1>
      Interview Question Generator
    </h1>

    <p class="subtitle">
      Generate thoughtful, role-specific interview questions powered by AI.
    </p>

    <!-- FORM -->
    <form id="questionForm">

      <div class="input-wrapper">

        <input
          id="jobTitle"
          type="text"
          placeholder="e.g. Customer Success Manager"
        />

      </div>

      <button type="submit">
        Generate Questions
      </button>

    </form>

    <!-- Loading -->
    <div
      id="loadingState"
      class="loading"
    >

      <div class="spinner"></div>

      <span>
        Generating questions...
      </span>

    </div>

    <!-- Error -->
    <div
      id="errorMessage"
      class="error"
    ></div>

    <!-- Results -->
    <section
      id="results"
      class="results"
    ></section>

  </main>

  <!-- JS -->
  <script
    type="module"
    src="./js/app.js"
  ></script>

</body>
</html>
